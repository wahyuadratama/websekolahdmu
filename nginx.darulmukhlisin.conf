# NGINX vhost untuk webskolahdmu (co-exist dengan setup lama)
# Frontend Next.js : 3100
# Backend Express  : 5100

server {
    listen 80;
    server_name darulmukhlisin.ponpes.id www.darulmukhlisin.ponpes.id;

    client_max_body_size 20m;

    # Frontend Next
    location / {
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # API backend (hindari double /api/api)
    location /api/ {
        proxy_pass http://127.0.0.1:5100/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Static upload langsung ke backend
    location /uploads/ {
        proxy_pass http://127.0.0.1:5100/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
